<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('imagenes/benjamin.png');
            background-size: cover;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .login-form img {
            margin-bottom: 20px;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-form input[type="submit"] {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-form input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <form class="login-form" action="valida.php" method="POST">
            <table align="center">
                <tr>
                    <td colspan="2" align="center">
                        <img src="imagenes/benjamin.png" width="100" alt="Candado">
                    </td>
                </tr>
                <tr>
                    <td>Usuario: </td>
                    <td><input type="text" name="user" placeholder="Ingrese su usuario"></td>
                </tr>
                <tr>
                    <td>Contraseña: </td>
                    <td><input type="password" name="pass" placeholder="Ingrese su contraseña"></td>
                </tr>
                <tr align="center">
                    <td colspan="2"><input type="submit" value="Ingresar"></td>
                </tr>
            </table>
        </form>
    </div>
</body>

</html>
